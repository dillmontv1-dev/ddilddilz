<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>띨띨즈 출석체크 명부 (Cloud Sync v2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&family=Noto+Sans+KR:wght=300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.05); border-radius: 999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0, 0, 0, 0.15); border-radius: 999px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(0, 0, 0, 0.25); }
        .loading-overlay { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 transition-colors duration-200">

<div id="loading-spinner" class="fixed inset-0 loading-overlay flex flex-col items-center justify-center z-50 hidden">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600"></div>
    <p class="text-sm font-semibold text-indigo-700 mt-3">구글 시트와 동기화 중...</p>
</div>

<div class="max-w-7xl mx-auto px-4 py-8 sm:px-6 lg:px-8">
    
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between pb-6 mb-8 border-b border-slate-200 gap-4">
        <div class="flex flex-col sm:flex-row sm:items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="p-2 bg-indigo-100 text-indigo-600 rounded-xl"><i class="fa-solid fa-clipboard-user font-bold text-xl"></i></span>
                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">띨띨즈 출석체크 명부</h1>
            </div>
            
            <div class="flex items-center gap-2.5 mt-1 sm:mt-0">
                <span id="active-month-badge" class="text-sm font-bold bg-indigo-50 text-indigo-700 px-3 py-1.5 rounded-lg border border-indigo-100 shadow-sm">
                    2026년 07월
                </span>
                <div class="flex items-center gap-1.5" data-html2canvas-ignore="true">
                    <select id="month-selector" onchange="switchMonth(this.value)" class="bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-xs font-semibold text-slate-600 focus:outline-none focus:ring-2 focus:ring-indigo-500 shadow-sm cursor-pointer">
                    </select>
                    <button onclick="openNewMonthModal()" class="inline-flex items-center justify-center p-2 text-indigo-600 bg-indigo-50 hover:bg-indigo-100 border border-indigo-100 rounded-lg transition shadow-sm" title="새로운 월 추가">
                        <i class="fa-solid fa-calendar-plus text-sm"></i>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-3" data-html2canvas-ignore="true">
            <button onclick="saveCloudData()" class="inline-flex items-center justify-center px-4 py-2 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg transition shadow-md gap-2 shadow-indigo-200">
                <i class="fa-solid fa-cloud-arrow-up"></i> 구글 시트에 저장하기
            </button>
            <button onclick="openAddStudentModal()" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 rounded-lg transition shadow-sm gap-2">
                <i class="fa-solid fa-plus"></i> 학생 추가
            </button>
            <button onclick="confirmReset()" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 rounded-lg transition shadow-sm gap-2">
                <i class="fa-solid fa-arrows-rotate text-amber-500"></i> 출석 초기화
            </button>
            <button onclick="captureAsImage()" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-slate-700 bg-white border border-slate-200 hover:bg-slate-50 rounded-lg transition shadow-sm gap-2">
                <i class="fa-solid fa-camera text-indigo-500"></i> 이미지 저장
            </button>
            <button onclick="exportToCSV()" class="inline-flex items-center justify-center px-4 py-2 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg transition shadow-sm gap-2">
                <i class="fa-solid fa-file-excel"></i> 엑셀(CSV) 다운로드
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">등록 학생 수</p>
                <h3 id="stat-total-students" class="text-3xl font-bold text-slate-800 mt-1">0명</h3>
            </div>
            <div class="p-3 bg-blue-50 text-blue-500 rounded-xl"><i class="fa-solid fa-users text-xl"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">학급 평균 목표 달성률</p>
                <h3 id="stat-class-avg" class="text-3xl font-bold text-slate-800 mt-1">0%</h3>
            </div>
            <div class="p-3 bg-emerald-50 text-emerald-500 rounded-xl"><i class="fa-solid fa-chart-pie text-xl"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">목표 달성자 (100%)</p>
                <h3 id="stat-perfect-count" class="text-3xl font-bold text-slate-800 mt-1">0명</h3>
            </div>
            <div class="p-3 bg-amber-50 text-amber-500 rounded-xl"><i class="fa-solid fa-star text-xl"></i></div>
        </div>
        <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm flex items-center justify-between">
            <div>
                <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">출석 경고 대상 (60% 미만)</p>
                <h3 id="stat-warn-count" class="text-3xl font-bold text-red-600 mt-1">0명</h3>
            </div>
            <div class="p-3 bg-red-50 text-red-500 rounded-xl"><i class="fa-solid fa-triangle-exclamation text-xl"></i></div>
        </div>
    </div>

    <div class="bg-white p-4 rounded-xl border border-slate-150 shadow-sm mb-6 flex flex-col sm:flex-row gap-4 items-center justify-between">
        <div class="relative w-full sm:w-80" data-html2canvas-ignore="true">
            <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">
                <i class="fa-solid fa-magnifying-glass"></i>
            </span>
            <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="학생 이름으로 검색..." class="w-full pl-10 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 text-sm">
        </div>
        <div id="target-notice-text" class="text-xs text-slate-400 font-medium"></div>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto custom-scrollbar">
            <table class="w-full text-left border-collapse min-w-[1000px]">
                <thead>
                    <tr id="table-header-row" class="bg-slate-50 border-b border-slate-100 text-slate-600 text-xs font-bold uppercase tracking-wider select-none"></tr>
                </thead>
                <tbody id="student-table-body" class="divide-y divide-slate-100 text-sm"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="add-student-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl border border-slate-100">
        <div class="flex items-center justify-between pb-3 border-b border-slate-100">
            <h3 class="text-lg font-bold text-slate-800">신규 학생 등록</h3>
            <button onclick="closeAddStudentModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div class="mt-4">
            <label for="new-student-name" class="block text-xs font-semibold text-slate-500 mb-2">학생 이름</label>
            <input type="text" id="new-student-name" onkeydown="if(event.key === 'Enter') saveStudent()" placeholder="이름을 입력하고 Enter..." class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mt-6 flex justify-end gap-3">
            <button onclick="closeAddStudentModal()" class="px-4 py-2 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg text-sm">취소</button>
            <button onclick="saveStudent()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">등록하기</button>
        </div>
    </div>
</div>

<div id="new-month-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl border border-slate-100">
        <div class="flex items-center justify-between pb-3 border-b border-slate-100">
            <h3 class="text-lg font-bold text-slate-800">새로운 월 추가</h3>
            <button onclick="closeNewMonthModal()" class="text-slate-400 hover:text-slate-600"><i class="fa-solid fa-xmark text-lg"></i></button>
        </div>
        <div class="mt-4">
            <p class="text-xs text-slate-500 mb-4 leading-relaxed">새로운 월을 만들면 구글 시트에 새 탭이 자동 생성되며 현재 명단이 복사됩니다.</p>
            <input type="month" id="new-month-input" class="w-full border border-slate-200 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div class="mt-6 flex justify-end gap-3">
            <button onclick="closeNewMonthModal()" class="px-4 py-2 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg text-sm">취소</button>
            <button onclick="saveNewMonth()" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium">생성하기</button>
        </div>
    </div>
</div>

<div id="reset-confirm-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-xl border border-slate-100">
        <div class="text-center p-2">
            <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-amber-100 text-amber-600 mb-4">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800">정말 출석률을 초기화하시겠습니까?</h3>
            <p class="text-sm text-slate-500 mt-2">화면의 이번 달 출석 현황이 전부 비워집니다. [구글 시트에 저장하기]를 누르기 전까지 시트에는 반영되지 않습니다.</p>
        </div>
        <div class="mt-6 flex justify-center gap-3">
            <button onclick="closeResetModal()" class="px-4 py-2 border border-slate-200 hover:bg-slate-50 text-slate-600 rounded-lg text-sm">취소</button>
            <button onclick="resetAttendance()" class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-lg text-sm font-medium">네, 초기화합니다</button>
        </div>
    </div>
</div>

<div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzwZTnZQlYhAmtmSAyDg9Ub_7VvJK0Bjb8cS3Ht-rJLlxUvfyuZVppQKxhtUpWfaaU/exec";

    const TOTAL_DAYS = 12;
    const REQUIRED_DAYS = 3;

    let state = {
        currentMonth: "2026-07",
        students: [],
        allMonths: ["2026-07"],
        searchQuery: ""
    };

    let activeDates = []; // 현재 월의 화, 목, 토 날짜 목록 저장 배열

    window.onload = function() {
        fetchCloudData();
        document.getElementById("target-notice-text").innerHTML = 
            `* 목표 수료 기준: <b>${REQUIRED_DAYS}일 이상</b> 출석 시 100% 달성 완료! (원하는 만큼 체크 후 꼭 우측 상단의 <b>[구글 시트에 저장하기]</b> 버튼을 눌러주세요!)`;
    };

    // 선택된 YYYY-MM 값에 따라 해당 월의 화, 목, 토 날짜를 자동 생성하는 함수
    function calculateTueThuSatDates(monthStr) {
        if (!monthStr || !monthStr.includes("-")) return [];
        const [yearStr, mStr] = monthStr.split("-");
        const year = parseInt(yearStr, 10);
        const month = parseInt(mStr, 10) - 1; // JS 월은 0부터 시작

        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const dates = [];
        const weekNames = ["일", "월", "화", "수", "목", "금", "토"];

        for (let day = 1; day <= daysInMonth; day++) {
            const dateObj = new Date(year, month, day);
            const dayOfWeek = dateObj.getDay(); // 2: 화, 4: 목, 6: 토
            if (dayOfWeek === 2 || dayOfWeek === 4 || dayOfWeek === 6) {
                dates.push({
                    month: month + 1,
                    day: day,
                    week: weekNames[dayOfWeek]
                });
            }
        }
        return dates;
    }

    function showLoading(show) {
        document.getElementById("loading-spinner").style.display = show ? "flex" : "none";
    }

    function fetchCloudData() {
        showLoading(true);
        fetch(`${SCRIPT_URL}?month=${state.currentMonth}`)
            .then(res => res.json())
            .then(data => {
                state.students = data.students || [];
                if(data.allMonths) state.allMonths = data.allMonths;
                
                // 월 변경/로드 시 해당 월의 화/목/토 날짜 계산 및 헤더 갱신
                activeDates = calculateTueThuSatDates(state.currentMonth);
                renderHeader();
                
                renderMonthSelector();
                render();
            })
            .catch(err => {
                console.error(err);
                showToast("구글 시트 데이터를 가져오지 못했습니다.", "warning");
            })
            .finally(() => showLoading(false));
    }

    function saveCloudData() {
        showLoading(true);
        fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                action: "saveAll",
                month: state.currentMonth,
                students: state.students
            })
        })
        .then(() => {
            showToast("구글 스프레드시트에 저장되었습니다! 💾", "success");
            render();
        })
        .catch(err => {
            console.error(err);
            showToast("구글 저장 실패", "warning");
        })
        .finally(() => showLoading(false));
    }

    function renderMonthSelector() {
        const selector = document.getElementById("month-selector");
        if (!selector) return;
        selector.innerHTML = "";
        
        state.allMonths.sort().forEach(m => {
            const opt = document.createElement("option");
            opt.value = m;
            opt.innerText = formatMonthLabel(m);
            if (m === state.currentMonth) opt.selected = true;
            selector.appendChild(opt);
        });
        document.getElementById("active-month-badge").innerText = formatMonthLabel(state.currentMonth);
    }

    function switchMonth(selectedMonth) {
        if(confirm("다른 월로 이동하시겠습니까? 저장하지 않은 출석 정보는 사라집니다. 이동 전 반드시 [구글 시트에 저장하기]를 눌러주세요.")) {
            state.currentMonth = selectedMonth;
            fetchCloudData();
        } else {
            renderMonthSelector();
        }
    }

    function openNewMonthModal() {
        document.getElementById("new-month-modal").style.display = "flex";
        const latest = state.allMonths.sort()[state.allMonths.length - 1] || "2026-07";
        const [year, month] = latest.split("-").map(Number);
        let nextYear = year, nextMonth = month + 1;
        if (nextMonth > 12) { nextMonth = 1; nextYear += 1; }
        document.getElementById("new-month-input").value = `${nextYear}-${String(nextMonth).padStart(2, '0')}`;
    }

    function closeNewMonthModal() { document.getElementById("new-month-modal").style.display = "none"; }

    function saveNewMonth() {
        const val = document.getElementById("new-month-input").value;
        if (!val) return;
        state.currentMonth = val;
        closeNewMonthModal();
        saveCloudData(); 
        setTimeout(() => { fetchCloudData(); }, 1500);
    }

    function formatMonthLabel(monthStr) {
        if (!monthStr || !monthStr.includes("-")) return monthStr;
        const [year, month] = monthStr.split("-");
        return `${year}년 ${month}월`;
    }

    // 헤더에 실제 날짜(예: 7/2(화))로 표시되도록 수정
    function renderHeader() {
        const headerRow = document.getElementById("table-header-row");
        let headers = `<th class="py-4 px-4 text-center w-12">번호</th><th class="py-4 px-6 w-44">이름</th>`;
        const defaultWeek = ["화", "목", "토"];

        for (let d = 0; d < TOTAL_DAYS; d++) {
            let label = "";
            if (activeDates && activeDates[d]) {
                // 해당 월의 실제 날짜와 요일 표기 (예: 7/2(화))
                label = `${activeDates[d].month}/${activeDates[d].day}(${activeDates[d].week})`;
            } else {
                // 해당 월의 화/목/토 횟수가 12회 미만일 경우 기존 기본 라벨 제공
                label = `D${d + 1}(${defaultWeek[d % 3]})`;
            }
            headers += `<th class="py-4 px-2 text-center whitespace-nowrap min-w-[3.5rem]">${label}</th>`;
        }
        headers += `<th class="py-4 px-4 text-center w-20">출석수</th><th class="py-4 px-6 text-center w-24">달성률</th><th class="py-4 px-4 text-center w-16" data-html2canvas-ignore="true">삭제</th>`;
        headerRow.innerHTML = headers;
    }

    function render() {
        const tbody = document.getElementById("student-table-body");
        tbody.innerHTML = "";
        const query = state.searchQuery.toLowerCase().trim();
        const filtered = state.students.filter(s => s.name.toLowerCase().includes(query));

        let perfect = 0, warn = 0, sumRates = 0;

        filtered.forEach((student, index) => {
            const attendedCount = student.attendance.filter(v => v).length;
            const rate = Math.min(attendedCount / REQUIRED_DAYS, 1.0);
            const isWarn = rate < 0.6;

            sumRates += rate;
            if (rate === 1.0) perfect++;
            if (isWarn) warn++;

            const tr = document.createElement("tr");
            tr.className = `transition-colors duration-150 ${isWarn ? 'bg-red-50/50 hover:bg-red-50' : 'hover:bg-slate-50'}`;
            
            let dCells = "";
            for (let d = 0; d < TOTAL_DAYS; d++) {
                const attended = student.attendance[d];
                dCells += `
                    <td class="py-3 px-2 text-center">
                        <button onclick="toggleCell(${student.id}, ${d})" class="w-6 h-6 rounded-md border flex items-center justify-center transition-all ${attended ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-200'}">
                            ${attended ? '<i class="fa-solid fa-check text-xs"></i>' : ''}
                        </button>
                    </td>`;
            }

            tr.innerHTML = `
                <td class="py-3 px-4 text-center font-medium text-slate-400">${index + 1}</td>
                <td class="py-3 px-6 font-semibold text-slate-700">${student.name}</td>
                ${dCells}
                <td class="py-3 px-4 text-center font-bold text-slate-800">${attendedCount}</td>
                <td class="py-3 px-6 text-center"><span class="px-2 py-1 rounded-full text-xs font-bold ${isWarn ? 'text-red-700 bg-red-100' : 'text-emerald-700 bg-emerald-100'}">${(rate * 100).toFixed(0)}%</span></td>
                <td class="py-3 px-4 text-center" data-html2canvas-ignore="true">
                    <button onclick="deleteStudent(${student.id})" class="text-slate-400 hover:text-red-500 p-1"><i class="fa-regular fa-trash-can"></i></button>
                </td>`;
            tbody.appendChild(tr);
        });

        document.getElementById("stat-total-students").innerText = `${state.students.length}명`;
        document.getElementById("stat-class-avg").innerText = `${state.students.length > 0 ? ((sumRates / state.students.length) * 100).toFixed(1) : 0}%`;
        document.getElementById("stat-perfect-count").innerText = `${perfect}명`;
        document.getElementById("stat-warn-count").innerText = `${warn}명`;
    }

    function toggleCell(studentId, sessionIdx) {
        const student = state.students.find(s => s.id === studentId);
        if (student) {
            student.attendance[sessionIdx] = !student.attendance[sessionIdx];
            render();
        }
    }

    function handleSearch(val) { state.searchQuery = val; render(); }
    
    function openAddStudentModal() { 
        document.getElementById("add-student-modal").style.display = "flex"; 
        document.getElementById("new-student-name").focus(); 
    }
    function closeAddStudentModal() { 
        document.getElementById("add-student-modal").style.display = "none"; 
        document.getElementById("new-student-name").value = ""; 
    }

    function saveStudent() {
        const name = document.getElementById("new-student-name").value.trim();
        if (!name) return;
        const newId = state.students.length > 0 ? Math.max(...state.students.map(s => s.id)) + 1 : 1;
        state.students.push({ id: newId, name: name, attendance: Array(TOTAL_DAYS).fill(false) });
        closeAddStudentModal();
        render();
    }

    function deleteStudent(id) {
        if(confirm("이 학생을 명단에서 삭제하시겠습니까? (구글 시트 반영은 저장 버튼을 누른 후 적용됩니다.)")) {
            state.students = state.students.filter(s => s.id !== id);
            render();
        }
    }

    function confirmReset() { document.getElementById("reset-confirm-modal").style.display = "flex"; }
    function closeResetModal() { document.getElementById("reset-confirm-modal").style.display = "none"; }
    function resetAttendance() {
        state.students.forEach(s => s.attendance = Array(TOTAL_DAYS).fill(false));
        closeResetModal();
        render();
    }

    function captureAsImage() {
        showToast("이미지 캡처를 시작합니다...", "info");
        html2canvas(document.querySelector('.max-w-7xl'), { scale: 2, backgroundColor: "#f8fafc" }).then(canvas => {
            const a = document.createElement('a');
            a.download = `출석체크_보고서_${state.currentMonth}.png`;
            a.href = canvas.toDataURL();
            a.click();
        });
    }

    // CSV 저장 시에도 날짜 표기 반영
    function exportToCSV() {
        let csv = "\uFEFF번호,이름,";
        for(let d=0; d<TOTAL_DAYS; d++) {
            let label = (activeDates && activeDates[d]) ? `${activeDates[d].month}/${activeDates[d].day}(${activeDates[d].week})` : `D${d+1}`;
            csv += `${label},`;
        }
        csv += "총 출석일수,달성률\n";
        state.students.forEach((s, i) => {
            const checks = s.attendance.map(v => v ? "O" : "X").join(",");
            const total = s.attendance.filter(v => v).length;
            const rate = (Math.min(total / REQUIRED_DAYS, 1.0) * 100).toFixed(0) + "%";
            csv += `${i+1},${s.name},${checks},${total},${rate}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `출석체크_명부_${state.currentMonth}.csv`;
        link.click();
    }

    function showToast(msg, type = "info") {
        const container = document.getElementById("toast-container");
        const toast = document.createElement("div");
        let bg = type === "success" ? "bg-emerald-600" : type === "warning" ? "bg-amber-500" : "bg-slate-800";
        toast.className = `${bg} text-white px-4 py-3 rounded-xl shadow-lg text-sm font-medium transition-all duration-300`;
        toast.innerText = msg;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }
</script>
</body>
</html>
